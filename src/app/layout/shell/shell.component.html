<div
  class="shell-layout"
  [class.nav-drawer-open]="navDrawerOpen()"
>
  <header class="mobile-nav-bar" aria-label="Mobile navigation">
    <button
      type="button"
      class="mobile-nav-btn"
      (click)="toggleNavDrawer()"
      aria-label="Open menu"
    >
      <span class="mobile-nav-icon" aria-hidden="true">☰</span>
    </button>
    <h1 class="mobile-nav-title">{{ pageTitle() }}</h1>
    <button
      type="button"
      class="mobile-nav-btn"
      (click)="toggleConceptsDrawer()"
      aria-label="Open concepts"
    >
      <span class="mobile-nav-icon" aria-hidden="true">?</span>
    </button>
  </header>

  <button
    type="button"
    class="drawer-backdrop nav-backdrop"
    (click)="closeNavDrawer()"
    [class.visible]="navDrawerOpen()"
    aria-hidden="true"
  ></button>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-text">
        <span class="brand-title">Angular</span>
        <span class="brand-sub">Internals Lab</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      @for (item of navItems; track item.route) {
        @if (item.available) {
          <a
            class="nav-link"
            [routerLink]="item.route"
            routerLinkActive="nav-link--active"
            [title]="item.description"
            (click)="closeNavDrawer()"
          >
            <div class="nav-content">
              <span class="nav-label">{{ item.label }}</span>
              <span class="nav-desc">{{ item.description }}</span>
            </div>
          </a>
        } @else {
          <div class="nav-link nav-link--disabled" [title]="item.description">
            <div class="nav-content">
              <span class="nav-label">{{ item.label }}</span>
              <span class="nav-desc">{{ item.description }}</span>
            </div>
            <span class="nav-soon">Soon</span>
          </div>
        }
      }
    </nav>

    <div class="sidebar-footer">
      <span class="sidebar-credit">Developed by Htet Wai Yan</span>
    </div>
  </aside>

  <button
    type="button"
    class="drawer-backdrop concepts-backdrop"
    (click)="closeConceptsDrawer()"
    [class.visible]="conceptsDrawerOpen()"
    aria-hidden="true"
  ></button>

  <main class="main-area">
    <router-outlet />
  </main>
</div>
